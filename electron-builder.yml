appId: com.pmy.app
productName: PmyApp
copyright: Copyright (c) 2025 PMY

directories:
  output: dist-electron
  buildResources: build

# Solo lo necesario para la app empaquetada (Next exportado en /out + Electron).
files:
  - main/**/*
  - out/**/*
  - build/icon.png
  - package.json

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: PmyApp
  artifactName: PmyApp-Setup-${version}.${ext}

# (Opcional) otras plataformas
linux:
  target: ["AppImage"]
  icon: build/icon.png
mac:
  target: ["dmg"]
  icon: build/icon.png
